<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Ustadz - App</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK CDN (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-gold-primary: #C2A878;
            --color-gold-dark: #A68A59;
            --color-gold-light: #F9F6F0;
            
            --color-dark-bg: #0F1714;
            --color-dark-card: #16221E;
            --color-dark-border: #1E2D28;
            --color-dark-shadow: #080C0A;
            --color-dark-text: #FDFBF7;
        }

        @layer components {
            .btn-timbul {
                @apply bg-gold-primary text-white font-semibold py-3 px-6 rounded-xl shadow-[0_4px_0_#A68A59] active:shadow-[0_0px_0_#A68A59] active:translate-y-1 transition-all;
            }
            .card-timbul {
                @apply bg-white dark:bg-dark-card rounded-2xl shadow-[0_6px_0_rgba(0,0,0,0.05)] dark:shadow-[0_6px_0_rgba(0,0,0,0.3)] border border-gray-100 dark:border-dark-border p-5;
            }
            .card-primary-timbul {
                @apply bg-gold-primary dark:bg-dark-card text-white rounded-2xl shadow-[0_6px_0_#A68A59] dark:shadow-[0_6px_0_#080C0A] p-5 transition-colors duration-200;
            }
        }

        body {
            @apply bg-[#FAFAFA] dark:bg-dark-bg text-gray-800 dark:text-dark-text transition-colors duration-200;
            -webkit-tap-highlight-color: transparent;
        }

        button {
            @apply transition-transform duration-200 hover:scale-[1.02] active:scale-[0.98];
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext } = React;

        // --- Konfigurasi Firebase ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0494794469",
            appId: "1:162743599434:web:d4a60a6f914399933b81b3",
            apiKey: "AIzaSyATN68ZTF7b7sQp9FudUjXmG1Dwv26vzMw",
            authDomain: "gen-lang-client-0494794469.firebaseapp.com",
            storageBucket: "gen-lang-client-0494794469.firebasestorage.app",
            messagingSenderId: "162743599434"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        // --- Auth Context ---
        const AuthContext = createContext();

        function AuthProvider({ children }) {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((user) => {
                    setCurrentUser(user);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            const loginWithGoogle = async () => {
                try {
                    await auth.signInWithPopup(googleProvider);
                } catch (error) {
                    console.error('Error signing in with Google', error);
                }
            };

            const logout = async () => {
                try {
                    await auth.signOut();
                } catch (error) {
                    console.error('Error signing out', error);
                }
            };

            return (
                <AuthContext.Provider value={{ currentUser, loading, loginWithGoogle, logout }}>
                    {!loading && children}
                </AuthContext.Provider>
            );
        }

        const useAuth = () => useContext(AuthContext);

        // --- Komponen Ikon Lucide ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Komponen Utama Aplikasi ---
        function App() {
            const { currentUser, loginWithGoogle, logout } = useAuth();
            const [activeTab, setActiveTab] = useState('home');
            const [theme, setTheme] = useState('light');
            const [schedules, setSchedules] = useState([]);
            const [profile, setProfile] = useState({ name: 'Ustadz', photo: null, title: 'Ustadz' });

            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [theme]);

            useEffect(() => {
                if (!currentUser) return;

                const userRef = db.collection('users').doc(currentUser.uid);
                const unsubscribe = userRef.onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        setProfile(data.profile || { name: currentUser.displayName || 'Ustadz', photo: currentUser.photoURL, title: 'Ustadz' });
                        setSchedules(data.schedules || []);
                    }
                });
                return unsubscribe;
            }, [currentUser]);

            if (!currentUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-gold-light dark:bg-dark-bg">
                        <div className="card-timbul w-full max-w-md text-center space-y-6">
                            <div className="w-20 h-20 bg-gold-primary rounded-full flex items-center justify-center mx-auto shadow-lg">
                                <Icon name="calendar" size={40} className="text-white" />
                            </div>
                            <h1 className="text-3xl font-bold">Jadwal Ustadz</h1>
                            <p className="text-gray-600 dark:text-gray-400">Kelola jadwal dakwah Anda dengan mudah.</p>
                            <button onClick={loginWithGoogle} className="w-full btn-timbul flex items-center justify-center gap-3">
                                <Icon name="log-in" size={20} /> Masuk dengan Google
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen max-w-md mx-auto bg-[#FAFAFA] dark:bg-dark-bg relative pb-24">
                    <div className="p-6">
                        {activeTab === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <p className="text-sm text-gray-500">Assalamu'alaikum,</p>
                                        <h1 className="text-xl font-bold">{profile.title} {profile.name}</h1>
                                    </div>
                                    <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 rounded-full bg-white dark:bg-dark-card shadow">
                                        <Icon name={theme === 'light' ? 'moon' : 'sun'} size={20} />
                                    </button>
                                </div>
                                <div className="card-primary-timbul">
                                    <h2 className="text-lg font-bold mb-2">Jadwal Terdekat</h2>
                                    <p className="text-sm opacity-90">Gunakan menu di bawah untuk melihat atau menambah jadwal baru.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'schedule' && (
                            <div className="space-y-4">
                                <h2 className="text-2xl font-bold">Jadwal Mendatang</h2>
                                {schedules.filter(s => s.status === 'upcoming').length === 0 ? (
                                    <p className="text-center text-gray-500 py-10">Belum ada jadwal.</p>
                                ) : (
                                    schedules.filter(s => s.status === 'upcoming').map(s => (
                                        <div key={s.id} className="card-timbul">
                                            <h3 className="font-bold text-lg">{s.masjid}</h3>
                                            <p className="text-sm text-gold-primary font-bold">{s.category}</p>
                                            <p className="text-sm text-gray-500">{s.date} | {s.time}</p>
                                            <p className="mt-2 text-sm italic">"{s.topic}"</p>
                                        </div>
                                    ))
                                )}
                            </div>
                        )}

                        {activeTab === 'profile' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold">Profil</h2>
                                <div className="card-timbul text-center space-y-4">
                                    <div className="w-20 h-20 bg-gold-light rounded-full mx-auto flex items-center justify-center border-2 border-gold-primary overflow-hidden">
                                        {profile.photo ? <img src={profile.photo} className="w-full h-full object-cover" /> : <Icon name="user" size={40} className="text-gold-primary" />}
                                    </div>
                                    <div>
                                        <p className="font-bold text-lg">{profile.name}</p>
                                        <p className="text-sm text-gray-500">{currentUser.email}</p>
                                    </div>
                                    <button onClick={logout} className="w-full py-2 text-red-500 font-bold border border-red-100 rounded-xl">Keluar</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Navigasi Bawah */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white dark:bg-dark-card border-t border-gray-100 dark:border-dark-border px-6 py-3 flex justify-around items-center z-50">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center ${activeTab === 'home' ? 'text-gold-primary' : 'text-gray-400'}`}>
                            <Icon name="home" size={24} />
                            <span className="text-[10px] mt-1 font-bold">Home</span>
                        </button>
                        <button onClick={() => setActiveTab('schedule')} className={`flex flex-col items-center ${activeTab === 'schedule' ? 'text-gold-primary' : 'text-gray-400'}`}>
                            <Icon name="calendar" size={24} />
                            <span className="text-[10px] mt-1 font-bold">Jadwal</span>
                        </button>
                        <button onClick={() => setActiveTab('profile')} className={`flex flex-col items-center ${activeTab === 'profile' ? 'text-gold-primary' : 'text-gray-400'}`}>
                            <Icon name="user" size={24} />
                            <span className="text-[10px] mt-1 font-bold">Profil</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthProvider><App /></AuthProvider>);
    </script>
</body>
</html>
